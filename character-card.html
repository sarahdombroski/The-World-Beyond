<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World Beyond - Character Card</title>
    <link rel="stylesheet" href="css/card.css" />
    <script src="js/character-card.mjs" type="module" defer></script>
</head>
<body>
    <header>
        <h1>The World Beyond</h1>
        <nav>
            <a href="index.html" id="homeNav">Home</a>
            <a href="character-generator.html" id="characterNav">Create Character</a>
            <a href="saved-characters.html" id="savedNav">Saved Characters</a>
        </nav>
    </header>
    <main>
        <div id="card-outline">
            <h2 id="Name"></h2>
            <div id="card-main-stats">
                <p id="class">Class:</p>
                <p id="subclass">Subclass:</p>
            </div>
            <img src="" alt="Card Image" id="characterCardImage" />
            <p id="stats-title">Stats:</p>
            <div id="card-all-stats">
                <p id="stats-race">Race:</p>
                <p id="stats-alignment">Alignment:</p>
                <p id="stats-traits">Traits:</p>
                <p id="stats-language">Language:</p>
                <p id="stats-height">Height:</p>
                <p id="stats-weight">Weight:</p>
            </div>
        </div>
        <button id="saveCharacterButton">Save this character</button>
    </main>
    <footer>
        <p>Special thanks to the D&D 5th Edition API</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World Beyond - Character Card</title>
    <link rel="stylesheet" href="css/card.css" />
    <script src="js/character-card.mjs" type="module" defer></script>
</head>
<body>
    <header>
        <h1>The World Beyond</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="character-generator.html">Create Character</a>
            <a href="saved-characters.html">Saved Characters</a>
        </nav>
    </header>
    <main>
        <div id="card-outline">
            <h2 id="Name"></h2>
            <div id="card-main-stats">
                <p id="class"></p>
                <p id="subclass"></p>
            </div>
            <img src="" alt="Card Image" id="characterCardImage" />
            <p id="stats-title">Stats:</p>
            <div id="card-all-stats">
                <p id="stats-race"></p>
                <p id="stats-alignment"></p>
                <p id="stats-traits"></p>
                <p id="stats-language"></p>
                <p id="stats-height"></p>
                <p id="stats-weight"></p>
            </div>
        </div>
        <button id="saveCharacterButton">Save this character</button>
    </main>
    <footer>
        <p>Special thanks to the D&D 5th Edition API</p>
    </footer>
</body>
</html>
